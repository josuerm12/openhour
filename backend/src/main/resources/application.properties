spring.application.name=openhour-backend

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/openhour;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

app.frontend-url=${FRONTEND_URL:http://localhost:5500}
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
